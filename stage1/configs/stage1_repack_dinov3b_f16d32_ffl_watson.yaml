# Optional checkpoint for reconstruction scripts.
ckpt_path: null

# Optional initialization checkpoint for continued training.
init_weight: null

model:
  base_learning_rate: 1.0e-05
  target: repack.models.autoencoder.RePackAutoencoder
  params:
    monitor: val/rec_loss
    embed_dim: 32
    sample_posterior: true
    lossconfig:
      target: repack.losses.WeightedLossCollection
      params:
        lpips_disc_loss:
          target: repack.losses.LPIPSWithDiscriminator
          params:
            disc_start: 1
            disc_weight: 0.5
            kl_weight: 1.0e-06
        focal_frequency_loss:
          target: repack.losses.FocalFrequencyLoss
          params:
            loss_weight: 0.05
            alpha: 1.0
        watson_distance_loss:
          target: repack.losses.WatsonLoss
          params:
            loss_weight: 0.005
            pretrained: true
    ddconfig:
      double_z: true
      z_channels: 32
      resolution: 256
      in_channels: 3
      out_ch: 3
      ch: 128
      ch_mult:
        - 1
        - 1
        - 2
        - 2
        - 4
      num_res_blocks: 2
      attn_resolutions:
        - 16
      dropout: 0.0
      model_name: facebook/dinov3-vitb16-pretrain-lvd1689m

data:
  target: repack.data.datamodule.DataModuleFromConfig
  params:
    batch_size: 8
    num_workers: 16
    wrap: true
    train:
      target: repack.data.txt_image.TxtImageDataset
      params:
        txt_file: /path/to/imagenet_train_paths.txt
        resolution: 256
        random_flip: true

lightning:
  trainer:
    accelerator: gpu
    devices: 4
    num_nodes: 1
    strategy: ddp_find_unused_parameters_true
    max_epochs: 99
    precision: 32

